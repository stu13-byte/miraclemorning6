<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록보기 – 미라클모닝</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrap">
    <header class="header">
      <div class="header-inner">
        <a href="dashboard.html" class="logo-link">
          <span class="logo-emoji">🌅</span>
          <span class="logo-text">미라클모닝</span>
        </a>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-ghost btn-sm" id="changePwBtn">🔒 비밀번호 변경</button>
          <button class="btn-logout" id="logoutBtn">로그아웃</button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <div class="page-header">
          <h1 class="page-title">기록보기 📊</h1>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="myRecords">내 기록</button>
          <button class="tab-btn" data-tab="badges">뱃지·업적</button>
          <button class="tab-btn" data-tab="classBoard">반 현황</button>
        </div>

        <!-- ===== 내 기록 Tab ===== -->
        <div class="tab-panel active" id="tab-myRecords">
          <div class="stat-grid" id="myStats">
            <div class="stat-card">
              <div class="stat-value" id="s-total">–</div>
              <div class="stat-label">총 참여 횟수</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="s-dist">–</div>
              <div class="stat-label">누적 거리 (km)</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="s-best">–</div>
              <div class="stat-label">개인 최고 거리 (km)</div>
            </div>
          </div>

          <div class="chart-container" id="chartWrap">
            <h3 class="section-title" style="margin-bottom:12px;">거리 추이</h3>
            <canvas id="distanceChart"></canvas>
          </div>

          <!-- 나의 수준은? 섹션 -->
          <div class="card" id="distributionSection" style="display:none;">
            <h3 class="section-title">나의 수준은? 🎯</h3>
            <div style="margin-bottom:12px;">
              <select class="form-control" id="distDateSelect" style="max-width:220px;"></select>
            </div>
            <div class="chart-container" style="margin-top:8px;">
              <canvas id="distributionChart"></canvas>
            </div>
            <p id="distributionText" style="text-align:center;margin-top:14px;font-size:14px;color:var(--text-secondary);line-height:1.7;"></p>
          </div>

          <h3 class="section-title">전체 기록</h3>
          <div class="table-wrap" id="recordsTableWrap">
            <div class="empty-state hidden" id="noRecords">
              <span class="empty-emoji">🏃</span>
              <p class="empty-text">아직 기록이 없어요. 첫 달리기를 시작해 보세요!</p>
            </div>
            <table id="recordsTable" style="display:none;">
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>시간</th>
                  <th>거리(km)</th>
                  <th>평균 페이스</th>
                </tr>
              </thead>
              <tbody id="recordsBody"></tbody>
            </table>
          </div>
        </div>

        <!-- ===== 뱃지·업적 Tab ===== -->
        <div class="tab-panel" id="tab-badges">
          <div class="badge-grid" id="badgeGrid"></div>
        </div>

        <!-- ===== 반 현황 Tab ===== -->
        <div class="tab-panel" id="tab-classBoard">
          <div class="stat-grid" id="classStats">
            <div class="stat-card">
              <div class="stat-value" id="c-avg">–</div>
              <div class="stat-label">반 평균 거리 (km)</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="c-top">–</div>
              <div class="stat-label">반 최고 기록 (km)</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="c-rank">–</div>
              <div class="stat-label">나의 순위</div>
            </div>
          </div>

          <div class="chart-container">
            <h3 class="section-title" style="margin-bottom:12px;">반 거리 현황</h3>
            <canvas id="classChart"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 비밀번호 변경 모달 -->
  <div class="modal-overlay hidden" id="changePwModal">
    <div class="modal">
      <h2 class="modal-title">🔒 비밀번호 변경</h2>
      <div class="form-group">
        <label class="form-label">현재 비밀번호</label>
        <input class="form-control" type="password" id="cp-current" placeholder="현재 비밀번호">
      </div>
      <div class="form-group">
        <label class="form-label">새 비밀번호 (4자 이상)</label>
        <input class="form-control" type="password" id="cp-new" placeholder="새 비밀번호" minlength="4">
      </div>
      <div class="form-group">
        <label class="form-label">새 비밀번호 확인</label>
        <input class="form-control" type="password" id="cp-confirm" placeholder="새 비밀번호 재입력">
      </div>
      <div id="cp-error" class="alert alert-error hidden"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cp-cancelBtn">취소</button>
        <button class="btn btn-primary" id="cp-confirmBtn">변경</button>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-emoji">✅</span>
    <div class="toast-body"><strong id="toastMsg"></strong></div>
  </div>

  <script type="module">
    import { requireAuth, logout, changePassword, getKoreanError } from './js/auth.js';
    import {
      getUserRecords, getClassData, calcUserStats, formatDateKorean,
      normRecord, formatTime, formatPace, calcPercentile
    } from './js/records.js';
    import { fetchBadgeDefs, formatBadgeDate, getImageSrc } from './js/badges.js';
    import { createDistanceChart, createClassChart, createDistributionChart } from './js/chart-init.js';

    const overlay = document.getElementById('loadingOverlay');
    let distChartInst = null;
    let classChartInst = null;
    let distroChartInst = null;

    requireAuth('student', async (userData) => {
      try {
        await initPage(userData);
      } finally {
        overlay.classList.add('hidden');
      }
    });

    async function initPage(userData) {
      const [records, classData, badgeDefs] = await Promise.all([
        getUserRecords(userData.uid),
        getClassData(userData.grade, userData.class),
        fetchBadgeDefs().catch(() => [])
      ]);

      renderMyRecords(records);
      renderBadges(userData.badges || {}, badgeDefs);
      renderClassBoard(classData, userData.uid);
      setupDistributionSection(records, classData, userData.uid);
    }

    function renderMyRecords(records) {
      const stats = calcUserStats(records);
      document.getElementById('s-total').textContent = stats.total.toLocaleString();
      document.getElementById('s-dist').textContent  = stats.totalDistanceKm.toFixed(2);
      document.getElementById('s-best').textContent  = stats.bestDistanceKm.toFixed(2);

      if (records.length === 0) {
        document.getElementById('noRecords').classList.remove('hidden');
        document.getElementById('chartWrap').style.display = 'none';
        return;
      }

      document.getElementById('recordsTable').style.display = '';
      const tbody  = document.getElementById('recordsBody');
      const sorted = [...records].sort((a, b) => b.date.localeCompare(a.date));
      tbody.innerHTML = sorted.map(r => {
        const n = normRecord(r);
        return `
          <tr>
            <td>${formatDateKorean(r.date)}</td>
            <td>${formatTime(n.seconds)}</td>
            <td>${n.distanceKm.toFixed(2)}</td>
            <td>${formatPace(n.distanceKm, n.seconds)}</td>
          </tr>
        `;
      }).join('');

      const ctx = document.getElementById('distanceChart').getContext('2d');
      if (distChartInst) distChartInst.destroy();
      distChartInst = createDistanceChart(ctx, records);
    }

    function setupDistributionSection(records, classData, myUid) {
      const myRecords = records.map(normRecord).sort((a, b) => b.date.localeCompare(a.date));
      if (myRecords.length === 0) return;

      const section = document.getElementById('distributionSection');
      section.style.display = '';

      const select = document.getElementById('distDateSelect');
      select.innerHTML = myRecords.map(r =>
        `<option value="${r.date}">${r.date}</option>`
      ).join('');

      function renderDistro(date) {
        const dayRecords = classData.records.map(normRecord).filter(r => r.date === date);
        const myRecord   = myRecords.find(r => r.date === date);
        const myKm       = myRecord ? myRecord.distanceKm : 0;
        const allValues  = dayRecords.map(r => r.distanceKm);
        const textEl     = document.getElementById('distributionText');

        if (allValues.length <= 1) {
          textEl.textContent = '비교 가능한 친구가 아직 없어요';
          if (distroChartInst) { distroChartInst.destroy(); distroChartInst = null; }
          return;
        }

        const ctx = document.getElementById('distributionChart').getContext('2d');
        if (distroChartInst) distroChartInst.destroy();
        distroChartInst = createDistributionChart(ctx, allValues, myKm);

        const p = calcPercentile(allValues, myKm);
        if (p) {
          textEl.innerHTML =
            `이 날 너의 거리 <strong>${myKm.toFixed(2)}km</strong> — 반에서 상위 <strong>${p.topPct}%</strong> (전체 ${p.total}명 중 ${p.rank}번째)`;
        }
      }

      renderDistro(myRecords[0].date);
      select.addEventListener('change', () => renderDistro(select.value));
    }

    function renderBadges(earnedBadges, badgeDefs) {
      const grid = document.getElementById('badgeGrid');
      if (!badgeDefs.length) {
        grid.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;padding:24px;">뱃지 정보를 불러올 수 없습니다.</p>';
        return;
      }
      const allIds = new Set([...badgeDefs.map(b => b.id), ...Object.keys(earnedBadges)]);
      const items = [];
      for (const id of allIds) {
        const def = badgeDefs.find(b => b.id === id) || { id, name: '삭제된 뱃지', desc: '', imageRef: '' };
        const earned = !!earnedBadges[id];
        const dateStr = earned ? formatBadgeDate(earnedBadges[id]) : '';
        items.push({ def, earned, dateStr });
      }
      items.sort((a, b) => {
        const ao = badgeDefs.findIndex(x => x.id === a.def.id);
        const bo = badgeDefs.findIndex(x => x.id === b.def.id);
        if (ao === -1 && bo === -1) return 0;
        if (ao === -1) return 1;
        if (bo === -1) return -1;
        return ao - bo;
      });
      grid.innerHTML = items.map(({ def, earned, dateStr }) => `
        <div class="badge-card ${earned ? 'earned' : 'unearned'}">
          <img class="badge-img" src="${getImageSrc(def.imageRef)}" alt="${def.name}" onerror="this.src='${getImageSrc('')}'">
          <div class="badge-name">${def.name}</div>
          <div class="badge-desc">${def.desc}</div>
          ${earned ? `<div class="badge-earned-date">${dateStr}</div>` : ''}
        </div>
      `).join('');
    }

    function renderClassBoard({ records, userMap }, myUid) {
      const kmByUid = {};
      records.forEach(r => {
        kmByUid[r.uid] = (kmByUid[r.uid] || 0) + normRecord(r).distanceKm;
      });

      const entries  = Object.entries(kmByUid).sort((a, b) => b[1] - a[1]);
      const myKm     = kmByUid[myUid] || 0;
      const myRank   = entries.findIndex(([uid]) => uid === myUid) + 1;
      const allKm    = Object.values(kmByUid);
      const avgKm    = allKm.length ? allKm.reduce((s, v) => s + v, 0) / allKm.length : 0;
      const topEntry = entries[0];
      const topName  = topEntry ? (userMap[topEntry[0]]?.name || '알 수 없음') : '-';
      const topKm    = topEntry ? topEntry[1] : 0;

      document.getElementById('c-avg').textContent  = avgKm.toFixed(2);
      document.getElementById('c-top').innerHTML    =
        `${topKm.toFixed(2)}<small style="font-size:13px;font-weight:500;"> (${topName})</small>`;
      document.getElementById('c-rank').textContent = myRank ? `${myRank}위` : '-';

      if (records.length === 0) return;

      const ctx = document.getElementById('classChart').getContext('2d');
      if (classChartInst) classChartInst.destroy();
      classChartInst = createClassChart(ctx, records, userMap, myUid);
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'index.html';
    });

    function showToast(msg) {
      document.getElementById('toastMsg').textContent = msg;
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.getElementById('changePwBtn').addEventListener('click', () => {
      document.getElementById('cp-current').value = '';
      document.getElementById('cp-new').value = '';
      document.getElementById('cp-confirm').value = '';
      document.getElementById('cp-error').classList.add('hidden');
      document.getElementById('changePwModal').classList.remove('hidden');
      document.getElementById('cp-current').focus();
    });

    document.getElementById('cp-cancelBtn').addEventListener('click', () => {
      document.getElementById('changePwModal').classList.add('hidden');
    });

    document.getElementById('cp-confirmBtn').addEventListener('click', async () => {
      const cur = document.getElementById('cp-current').value;
      const nw  = document.getElementById('cp-new').value;
      const conf= document.getElementById('cp-confirm').value;
      const errEl = document.getElementById('cp-error');
      errEl.classList.add('hidden');

      if (!cur || !nw || !conf) { errEl.textContent = '모든 항목을 입력해 주세요.'; errEl.classList.remove('hidden'); return; }
      if (nw.length < 4)        { errEl.textContent = '새 비밀번호는 4자 이상이어야 합니다.'; errEl.classList.remove('hidden'); return; }
      if (nw !== conf)          { errEl.textContent = '새 비밀번호가 일치하지 않습니다.'; errEl.classList.remove('hidden'); return; }

      document.getElementById('cp-confirmBtn').disabled = true;
      try {
        await changePassword(cur, nw);
        document.getElementById('changePwModal').classList.add('hidden');
        showToast('비밀번호가 변경되었습니다.');
      } catch (e) {
        const msg = getKoreanError(e);
        if (msg === 'requires-recent-login') {
          document.getElementById('changePwModal').classList.add('hidden');
          await logout();
          window.location.href = 'login.html';
        } else {
          errEl.textContent = msg;
          errEl.classList.remove('hidden');
        }
      } finally {
        document.getElementById('cp-confirmBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
