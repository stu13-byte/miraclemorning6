<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록보기 – 미라클모닝</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrap">
    <header class="header">
      <div class="header-inner">
        <a href="dashboard.html" class="logo-link">
          <span class="logo-emoji">🌅</span>
          <span class="logo-text">미라클모닝</span>
        </a>
        <button class="btn-logout" id="logoutBtn">로그아웃</button>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <div class="page-header">
          <h1 class="page-title">기록보기 📊</h1>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="myRecords">내 기록</button>
          <button class="tab-btn" data-tab="badges">뱃지·업적</button>
          <button class="tab-btn" data-tab="classBoard">반 현황</button>
        </div>

        <!-- ===== 내 기록 Tab ===== -->
        <div class="tab-panel active" id="tab-myRecords">
          <div class="stat-grid" id="myStats">
            <div class="stat-card">
              <div class="stat-value" id="s-total">–</div>
              <div class="stat-label">총 참여 횟수</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="s-dist">–</div>
              <div class="stat-label">누적 거리 (m)</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="s-best">–</div>
              <div class="stat-label">개인 최고 바퀴</div>
            </div>
          </div>

          <div class="chart-container" id="chartWrap">
            <h3 class="section-title" style="margin-bottom:12px;">바퀴 수 추이</h3>
            <canvas id="lapsChart"></canvas>
          </div>

          <h3 class="section-title">전체 기록</h3>
          <div class="table-wrap" id="recordsTableWrap">
            <div class="empty-state hidden" id="noRecords">
              <span class="empty-emoji">🏃</span>
              <p class="empty-text">아직 기록이 없어요. 첫 달리기를 시작해 보세요!</p>
            </div>
            <table id="recordsTable" style="display:none;">
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>시간(분)</th>
                  <th>바퀴</th>
                  <th>거리(m)</th>
                </tr>
              </thead>
              <tbody id="recordsBody"></tbody>
            </table>
          </div>
        </div>

        <!-- ===== 뱃지·업적 Tab ===== -->
        <div class="tab-panel" id="tab-badges">
          <div class="badge-grid" id="badgeGrid"></div>
        </div>

        <!-- ===== 반 현황 Tab ===== -->
        <div class="tab-panel" id="tab-classBoard">
          <div class="stat-grid" id="classStats">
            <div class="stat-card">
              <div class="stat-value" id="c-avg">–</div>
              <div class="stat-label">반 평균 바퀴</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="c-top">–</div>
              <div class="stat-label">반 최고 기록</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="c-rank">–</div>
              <div class="stat-label">나의 순위</div>
            </div>
          </div>

          <div class="chart-container">
            <h3 class="section-title" style="margin-bottom:12px;">반 바퀴 현황</h3>
            <canvas id="classChart"></canvas>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script type="module">
    import { requireAuth, logout } from './js/auth.js';
    import {
      getUserRecords, getClassData, calcUserStats, formatDateKorean
    } from './js/records.js';
    import { BADGE_DEFS, formatBadgeDate } from './js/badges.js';
    import { createLapsChart, createClassChart } from './js/chart-init.js';

    const overlay = document.getElementById('loadingOverlay');
    let lapsChartInst = null;
    let classChartInst = null;

    requireAuth('student', async (userData) => {
      try {
        await initPage(userData);
      } finally {
        overlay.classList.add('hidden');
      }
    });

    async function initPage(userData) {
      const [records, classData] = await Promise.all([
        getUserRecords(userData.uid),
        getClassData(userData.grade, userData.class)
      ]);

      renderMyRecords(records);
      renderBadges(userData.badges || {});
      renderClassBoard(classData, userData.uid, userData.class);
    }

    function renderMyRecords(records) {
      const stats = calcUserStats(records);
      document.getElementById('s-total').textContent = stats.total.toLocaleString();
      document.getElementById('s-dist').textContent  = stats.totalDistance.toLocaleString();
      document.getElementById('s-best').textContent  = stats.bestLaps;

      if (records.length === 0) {
        document.getElementById('noRecords').classList.remove('hidden');
        document.getElementById('chartWrap').style.display = 'none';
        return;
      }

      document.getElementById('recordsTable').style.display = '';
      const tbody = document.getElementById('recordsBody');
      const sorted = [...records].sort((a, b) => b.date.localeCompare(a.date));
      tbody.innerHTML = sorted.map(r => `
        <tr>
          <td>${formatDateKorean(r.date)}</td>
          <td>${r.minutes}분</td>
          <td>${r.laps}바퀴</td>
          <td>${r.distance}m</td>
        </tr>
      `).join('');

      // Chart
      const ctx = document.getElementById('lapsChart').getContext('2d');
      if (lapsChartInst) lapsChartInst.destroy();
      lapsChartInst = createLapsChart(ctx, records);
    }

    function renderBadges(earnedBadges) {
      const grid = document.getElementById('badgeGrid');
      grid.innerHTML = BADGE_DEFS.map(b => {
        const earned = !!earnedBadges[b.id];
        const dateStr = earned ? formatBadgeDate(earnedBadges[b.id]) : '';
        return `
          <div class="badge-card ${earned ? 'earned' : 'unearned'}">
            <span class="badge-emoji">${b.emoji}</span>
            <div class="badge-name">${b.name}</div>
            <div class="badge-desc">${b.desc}</div>
            ${earned ? `<div class="badge-earned-date">${dateStr}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function renderClassBoard({ records, userMap }, myUid, myClass) {
      // Aggregate total laps per user
      const lapsByUid = {};
      records.forEach(r => {
        lapsByUid[r.uid] = (lapsByUid[r.uid] || 0) + r.laps;
      });

      const entries = Object.entries(lapsByUid).sort((a, b) => b[1] - a[1]);
      const myLaps  = lapsByUid[myUid] || 0;
      const myRank  = entries.findIndex(([uid]) => uid === myUid) + 1;

      const allLaps  = Object.values(lapsByUid);
      const avgLaps  = allLaps.length ? Math.round(allLaps.reduce((s, v) => s + v, 0) / allLaps.length) : 0;
      const topEntry = entries[0];
      const topName  = topEntry ? (userMap[topEntry[0]]?.name || '알 수 없음') : '-';
      const topLaps  = topEntry ? topEntry[1] : 0;

      document.getElementById('c-avg').textContent  = avgLaps;
      document.getElementById('c-top').innerHTML    = `${topLaps}<small style="font-size:13px;font-weight:500;"> (${topName})</small>`;
      document.getElementById('c-rank').textContent = myRank ? `${myRank}위` : '-';

      if (records.length === 0) return;

      const ctx = document.getElementById('classChart').getContext('2d');
      if (classChartInst) classChartInst.destroy();
      classChartInst = createClassChart(ctx, records, userMap, myUid);
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
