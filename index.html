<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미라클모닝 🌅</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrap">
    <div class="landing">
      <span class="landing-logo">🌅</span>
      <h1 class="landing-title">미라클모닝</h1>
      <p class="landing-sub">초등학교 아침 스포츠 클럽 달리기 기록</p>
      <div class="landing-actions">
        <a href="login.html" class="btn btn-primary btn-lg">로그인</a>
        <a href="register.html" class="btn btn-secondary btn-lg">회원가입</a>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { db } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const overlay = document.getElementById('loadingOverlay');

    onAuthStateChanged(auth, async (user) => {
      if (!user) { overlay.classList.add('hidden'); return; }
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists()) {
          const role = snap.data().role;
          window.location.href = role === 'teacher' ? 'admin.html' : 'dashboard.html';
        } else {
          overlay.classList.add('hidden');
        }
      } catch {
        overlay.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
