<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 – 미라클모닝</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="page-wrap">
    <div class="auth-page">
      <div class="auth-card card">
        <div class="auth-logo">
          <span class="auth-logo-emoji">🌅</span>
          <span class="auth-logo-name">미라클모닝</span>
        </div>

        <h1 class="auth-title">회원가입</h1>
        <p class="auth-subtitle">정보를 입력하고 미라클모닝을 시작하세요!</p>

        <div id="errorMsg" class="alert alert-error hidden"></div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="name">이름</label>
            <input class="form-control" type="text" id="name" placeholder="홍길동" required autocomplete="name">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="grade">학년</label>
              <select class="form-control" id="grade" required>
                <option value="">선택</option>
                <option value="1">1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
                <option value="4">4학년</option>
                <option value="5">5학년</option>
                <option value="6">6학년</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="classNum">반</label>
              <select class="form-control" id="classNum" required>
                <option value="">선택</option>
                <option value="1">1반</option>
                <option value="2">2반</option>
                <option value="3">3반</option>
                <option value="4">4반</option>
                <option value="5">5반</option>
                <option value="6">6반</option>
                <option value="7">7반</option>
                <option value="8">8반</option>
                <option value="9">9반</option>
                <option value="10">10반</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="number">번호</label>
              <select class="form-control" id="number" required>
                <option value="">선택</option>
                <!-- generated by JS -->
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">성별</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" name="gender" id="genderM" value="남" required>
                <label for="genderM">남</label>
              </div>
              <div class="radio-option">
                <input type="radio" name="gender" id="genderF" value="여">
                <label for="genderF">여</label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="referrer">추천인 학번 (선택)</label>
            <input class="form-control" type="text" id="referrer"
              placeholder="예) 60705" maxlength="6" inputmode="numeric"
              autocomplete="off">
            <p class="form-hint">추천인 학번을 입력하면 추천인에게 뱃지 혜택이 주어집니다.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">비밀번호</label>
            <input class="form-control" type="password" id="password"
              placeholder="4자 이상 입력" autocomplete="new-password" minlength="4" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="passwordConfirm">비밀번호 확인</label>
            <input class="form-control" type="password" id="passwordConfirm"
              placeholder="비밀번호 재입력" autocomplete="new-password" required>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="submitBtn" style="margin-top:8px;">
            다음 →
          </button>
        </form>

        <div class="auth-footer">
          이미 계정이 있나요? <a href="login.html">로그인</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal">
      <h2 class="modal-title">정보 확인 ✅</h2>
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">아래 정보가 맞는지 확인해 주세요.</p>
      <div class="modal-info">
        <p>이름: <strong id="previewName"></strong></p>
        <p>학번: <strong id="previewStudentId"></strong></p>
        <p>학년/반/번호: <strong id="previewClass"></strong></p>
        <p>성별: <strong id="previewGender"></strong></p>
        <p id="previewReferrerRow" style="display:none;">추천인 학번: <strong id="previewReferrer"></strong></p>
      </div>
      <div id="modalError" class="alert alert-error hidden"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">다시 입력</button>
        <button class="btn btn-primary" id="confirmBtn">맞습니다! 가입하기</button>
      </div>
    </div>
  </div>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-emoji">ℹ️</span>
    <div class="toast-body"><strong id="toastMsg"></strong></div>
  </div>

  <script type="module">
    import { register, getKoreanError, onAuthChange, getUserData, buildStudentId, buildEmail } from './js/auth.js';

    function showToast(msg) {
      document.getElementById('toastMsg').textContent = msg;
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // Populate number dropdown
    const numberSel = document.getElementById('number');
    for (let i = 1; i <= 70; i++) {
      const opt = document.createElement('option');
      opt.value = i; opt.textContent = `${i}번`;
      numberSel.appendChild(opt);
    }

    // If already logged in, redirect
    onAuthChange(async (user) => {
      if (!user) return;
      try {
        const data = await getUserData(user.uid);
        if (data) window.location.href = data.role === 'teacher' ? 'admin.html' : 'dashboard.html';
      } catch { /* ignore */ }
    });

    const form         = document.getElementById('registerForm');
    const errorMsg     = document.getElementById('errorMsg');
    const confirmModal = document.getElementById('confirmModal');
    const overlay      = document.getElementById('loadingOverlay');
    const modalError   = document.getElementById('modalError');

    let pendingData = null;

    function showError(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }
    function hideError(el)      { el.classList.add('hidden'); }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      hideError(errorMsg);

      const name     = document.getElementById('name').value.trim();
      const grade    = document.getElementById('grade').value;
      const classNum = document.getElementById('classNum').value;
      const number   = document.getElementById('number').value;
      const gender   = document.querySelector('input[name="gender"]:checked')?.value || '';
      const referrerStudentId = document.getElementById('referrer').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      if (!name || !grade || !classNum || !number || !gender) {
        showError(errorMsg, '모든 항목을 입력해 주세요.'); return;
      }
      if (password.length < 4) {
        showError(errorMsg, '비밀번호는 4자 이상이어야 합니다.'); return;
      }
      if (password !== passwordConfirm) {
        showError(errorMsg, '비밀번호가 일치하지 않습니다.'); return;
      }

      const studentId = buildStudentId(grade, classNum, number);
      pendingData = { name, grade, classNum, number, gender, password, studentId, referrerStudentId };

      // Fill modal
      document.getElementById('previewName').textContent      = name;
      document.getElementById('previewStudentId').textContent = studentId;
      document.getElementById('previewClass').textContent     = `${grade}학년 ${classNum}반 ${number}번`;
      document.getElementById('previewGender').textContent    = gender;
      if (referrerStudentId) {
        document.getElementById('previewReferrer').textContent = referrerStudentId;
        document.getElementById('previewReferrerRow').style.display = '';
      } else {
        document.getElementById('previewReferrerRow').style.display = 'none';
      }
      hideError(modalError);
      confirmModal.classList.remove('hidden');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      confirmModal.classList.add('hidden');
    });

    document.getElementById('confirmBtn').addEventListener('click', async () => {
      if (!pendingData) return;
      hideError(modalError);
      overlay.classList.remove('hidden');
      document.getElementById('confirmBtn').disabled = true;

      try {
        const result = await register(pendingData);
        if (result?.warning === 'referrer_invalid') {
          showToast('추천인 정보가 확인되지 않아 저장되지 않았습니다.');
          await new Promise(r => setTimeout(r, 1500));
        }
        window.location.href = 'dashboard.html';
      } catch (err) {
        overlay.classList.add('hidden');
        document.getElementById('confirmBtn').disabled = false;
        showError(modalError, getKoreanError(err));
      }
    });
  </script>
</body>
</html>
